name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Detection
        - Fishing bar control
        - App UI
        - CLI
        - Packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
    validations:
      required: false
