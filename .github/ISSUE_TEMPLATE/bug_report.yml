name: Bug report
description: Report a fishing automation problem.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include enough information to reproduce the state transition or detection problem.
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "Example: macOS 15.5"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac model / chip
      placeholder: "Example: MacBook Pro M3 Pro"
    validations:
      required: true
  - type: input
    id: window-size
    attributes:
      label: Game window size
      placeholder: "Example: 0,33 1280x804"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: App or CLI
      options:
        - SwiftUI app
        - CLI
    validations:
      required: true
  - type: dropdown
    id: state
    attributes:
      label: Failing state
      options:
        - Start fishing prompt
        - Blue hook prompt
        - Fishing bar control
        - Result screen close
        - Loop transition
        - Window focus / pause
        - Permissions
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the last 30-60 log lines around the failure.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshot or screen recording
      description: Drag a short recording or screenshot here if possible.
    validations:
      required: false
